<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Snake Game</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body {
    height: 100%;
    overflow: hidden;
  }
  body {
    background: linear-gradient(135deg, #0f172a, #1e293b);
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: flex-start;
    font-family: 'Segoe UI', sans-serif;
    color: #e2e8f0;
    padding: 10px;
    gap: 6px;
  }
  h1 {
    font-size: 22px;
    letter-spacing: 2px;
    color: #4ade80;
    margin-top: 4px;
  }
  #scoreBoard {
    font-size: 16px;
    display: flex;
    gap: 18px;
  }
  #scoreBoard span { font-weight: bold; color: #4ade80; }
  #topRow {
    display: flex;
    align-items: center;
    gap: 8px;
  }
  #highScoreBadge {
    font-size: 13px;
    background: rgba(74, 222, 128, 0.12);
    border: 1px solid #4ade80;
    padding: 3px 10px;
    border-radius: 20px;
    color: #4ade80;
    font-weight: bold;
  }
  #muteBtn {
    background: rgba(255,255,255,0.08);
    border: 1px solid #475569;
    color: #e2e8f0;
    padding: 4px 8px;
    border-radius: 20px;
    font-size: 14px;
    line-height: 1;
  }
  #muteBtn:hover { background: rgba(255,255,255,0.15); }
  #gameCanvas {
    background: #0b1120;
    border: 4px solid #4ade80;
    border-radius: 10px;
    box-shadow: 0 0 25px rgba(74, 222, 128, 0.4);
    width: min(380px, 88vw);
    height: min(380px, 88vw);
    touch-action: none;
  }
  #overlay {
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.8);
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 12px;
    text-align: center;
    padding: 20px;
  }
  #overlay.hidden { display: none; }
  #overlay h2 { font-size: 26px; color: #f87171; }
  #overlayHighScore {
    font-size: 15px;
    color: #4ade80;
    font-weight: bold;
  }
  button {
    background: #4ade80;
    border: none;
    padding: 10px 24px;
    font-size: 16px;
    border-radius: 8px;
    cursor: pointer;
    font-weight: bold;
    color: #0b1120;
  }
  button:hover { background: #22c55e; }
  #controls {
    font-size: 13px;
    color: #94a3b8;
    text-align: center;
  }
  #mobileControls {
    display: grid;
    grid-template-columns: 46px 46px 46px;
    grid-template-rows: 46px 46px 46px;
    gap: 5px;
  }
  #mobileControls button {
    padding: 0;
    font-size: 18px;
  }
  .up { grid-column: 2; grid-row: 1; }
  .left { grid-column: 1; grid-row: 2; }
  .right { grid-column: 3; grid-row: 2; }
  .down { grid-column: 2; grid-row: 3; }
</style>
</head>
<body>
  <h1>🐍 Snake Game</h1>
  <div id="topRow">
    <div id="highScoreBadge">🏆 All-Time High Score: <span id="highScoreTop">0</span></div>
    <button id="muteBtn" onclick="toggleMute()">🔊</button>
  </div>
  <div id="scoreBoard">Score: <span id="score">0</span></div>
  <canvas id="gameCanvas" width="400" height="400"></canvas>
  <div id="controls">Use Arrow Keys / WASD to move</div>
  <div id="mobileControls">
    <button class="up" onclick="setDir(0,-1)">↑</button>
    <button class="left" onclick="setDir(-1,0)">←</button>
    <button class="right" onclick="setDir(1,0)">→</button>
    <button class="down" onclick="setDir(0,1)">↓</button>
  </div>

  <div id="overlay">
    <h2 id="overlayTitle">Snake Game</h2>
    <div id="overlayMsg">Click the button below to start</div>
    <div id="overlayHighScore">🏆 All-Time High Score: <span id="highScoreOverlay">0</span></div>
    <button onclick="startGame()">Start Game</button>
  </div>

<script>
const canvas = document.getElementById('gameCanvas');
const ctx = canvas.getContext('2d');
const box = 20;
const gridSize = canvas.width / box;

// Fallback for browsers without roundRect support
if (!ctx.roundRect) {
  CanvasRenderingContext2D.prototype.roundRect = function(x, y, w, h, r) {
    this.beginPath();
    this.moveTo(x + r, y);
    this.arcTo(x + w, y, x + w, y + h, r);
    this.arcTo(x + w, y + h, x, y + h, r);
    this.arcTo(x, y + h, x, y, r);
    this.arcTo(x, y, x + w, y, r);
    this.closePath();
    return this;
  };
}

// ---- Sound Engine (Web Audio API, no external files needed) ----
let audioCtx = null;
let audioUnlocked = false;
let muted = false;
try { muted = localStorage.getItem('snakeMuted') === 'true'; } catch(e) {}

function ensureAudioCtx() {
  if (!audioCtx) {
    try {
      const AC = window.AudioContext || window.webkitAudioContext;
      audioCtx = new AC();
    } catch (e) {
      console.warn('Web Audio not supported', e);
      return null;
    }
  }
  return audioCtx;
}

// Unlock audio on the very first user interaction anywhere on the page.
// Mobile browsers block audio until a real touch/click gesture happens.
function unlockAudio() {
  if (audioUnlocked) return;
  const ctxA = ensureAudioCtx();
  if (!ctxA) return;
  if (ctxA.state === 'suspended') {
    ctxA.resume();
  }
  // Play a silent buffer once — this is what actually "unlocks" audio on iOS/Android webviews
  const buffer = ctxA.createBuffer(1, 1, 22050);
  const src = ctxA.createBufferSource();
  src.buffer = buffer;
  src.connect(ctxA.destination);
  src.start(0);
  audioUnlocked = true;
  startBackgroundMusic();
}
['touchstart', 'touchend', 'mousedown', 'click', 'keydown'].forEach(evt => {
  document.addEventListener(evt, unlockAudio, { once: false, passive: true });
});

function beep(freq, duration, type, volume, delay) {
  if (muted) return;
  const ctxA = ensureAudioCtx();
  if (!ctxA) return;
  if (ctxA.state === 'suspended') ctxA.resume();
  const osc = ctxA.createOscillator();
  const gain = ctxA.createGain();
  osc.type = type || 'square';
  osc.frequency.value = freq;
  const startTime = ctxA.currentTime + (delay || 0);
  gain.gain.setValueAtTime(volume || 0.15, startTime);
  gain.gain.exponentialRampToValueAtTime(0.001, startTime + duration);
  osc.connect(gain);
  gain.connect(ctxA.destination);
  osc.start(startTime);
  osc.stop(startTime + duration);
}

function playEatSound() {
  beep(600, 0.08, 'square', 0.18, 0);
  beep(900, 0.1, 'square', 0.18, 0.06);
}

function playGameOverSound() {
  beep(300, 0.15, 'sawtooth', 0.2, 0);
  beep(220, 0.15, 'sawtooth', 0.2, 0.15);
  beep(140, 0.35, 'sawtooth', 0.2, 0.3);
}

function playStartSound() {
  beep(440, 0.08, 'square', 0.14, 0);
  beep(660, 0.1, 'square', 0.14, 0.08);
}

function toggleMute() {
  muted = !muted;
  try { localStorage.setItem('snakeMuted', muted); } catch(e) {}
  updateMuteBtn();
  if (!muted) {
    unlockAudio();
  } else {
    stopBackgroundMusic();
  }
}

function updateMuteBtn() {
  document.getElementById('muteBtn').textContent = muted ? '🔇' : '🔊';
}
updateMuteBtn();

// ---- Background music: a simple looping chiptune-style melody with bass ----
const bgMelody = [330, 392, 440, 392, 330, 262, 294, 330, 392, 440, 494, 440, 392, 330, 294, 262];
const bgBass   = [165, 165, 220, 220, 165, 131, 147, 147, 196, 196, 247, 247, 196, 165, 147, 131];
let bgIndex = 0;
let bgTimer = null;
const bgNoteLength = 260; // ms per note

function playBgNote() {
  if (muted) return;
  const ctxA = ensureAudioCtx();
  if (!ctxA) return;
  const i = bgIndex % bgMelody.length;
  const startTime = ctxA.currentTime;
  const dur = bgNoteLength / 1000;

  // melody voice
  const osc = ctxA.createOscillator();
  const gain = ctxA.createGain();
  osc.type = 'triangle';
  osc.frequency.value = bgMelody[i];
  gain.gain.setValueAtTime(0.045, startTime);
  gain.gain.exponentialRampToValueAtTime(0.001, startTime + dur);
  osc.connect(gain);
  gain.connect(ctxA.destination);
  osc.start(startTime);
  osc.stop(startTime + dur);

  // bass voice
  const osc2 = ctxA.createOscillator();
  const gain2 = ctxA.createGain();
  osc2.type = 'sine';
  osc2.frequency.value = bgBass[i];
  gain2.gain.setValueAtTime(0.035, startTime);
  gain2.gain.exponentialRampToValueAtTime(0.001, startTime + dur);
  osc2.connect(gain2);
  gain2.connect(ctxA.destination);
  osc2.start(startTime);
  osc2.stop(startTime + dur);

  bgIndex++;
}

function startBackgroundMusic() {
  if (bgTimer || muted) return;
  bgIndex = 0;
  playBgNote();
  bgTimer = setInterval(playBgNote, bgNoteLength);
}

function stopBackgroundMusic() {
  if (bgTimer) {
    clearInterval(bgTimer);
    bgTimer = null;
  }
}
// ------------------------------------------------------------

let snake, direction, nextDirection, food, score, highScore, gameLoop, speed;

highScore = 0;
try { highScore = parseInt(localStorage.getItem('snakeHighScore')) || 0; } catch(e) {}
document.getElementById('highScoreTop').textContent = highScore;
document.getElementById('highScoreOverlay').textContent = highScore;

function updateHighScoreDisplay() {
  document.getElementById('highScoreTop').textContent = highScore;
  document.getElementById('highScoreOverlay').textContent = highScore;
}

function randomFood() {
  let pos;
  do {
    pos = {
      x: Math.floor(Math.random() * gridSize),
      y: Math.floor(Math.random() * gridSize)
    };
  } while (snake.some(s => s.x === pos.x && s.y === pos.y));
  return pos;
}

function resetGame() {
  snake = [{x: 9, y: 10}, {x: 8, y: 10}, {x: 7, y: 10}];
  direction = {x: 1, y: 0};
  nextDirection = {x: 1, y: 0};
  food = randomFood();
  score = 0;
  speed = 130;
  document.getElementById('score').textContent = score;
}

function startGame() {
  unlockAudio();
  playStartSound();
  startBackgroundMusic();
  document.getElementById('overlay').classList.add('hidden');
  resetGame();
  if (gameLoop) clearInterval(gameLoop);
  gameLoop = setInterval(tick, speed);
  draw();
}

function endGame() {
  clearInterval(gameLoop);
  stopBackgroundMusic();
  playGameOverSound();
  if (score > highScore) {
    highScore = score;
    try { localStorage.setItem('snakeHighScore', highScore); } catch(e) {}
  }
  updateHighScoreDisplay();
  document.getElementById('overlayTitle').textContent = 'Game Over!';
  document.getElementById('overlayMsg').textContent = 'Your Score: ' + score;
  document.getElementById('overlay').classList.remove('hidden');
}

function setDir(x, y) {
  if (direction.x === -x && direction.y === -y) return; // prevent reverse
  if (direction.x === x && direction.y === y) return;
  nextDirection = {x, y};
}

document.addEventListener('keydown', e => {
  switch(e.key) {
    case 'ArrowUp': case 'w': case 'W': setDir(0, -1); break;
    case 'ArrowDown': case 's': case 'S': setDir(0, 1); break;
    case 'ArrowLeft': case 'a': case 'A': setDir(-1, 0); break;
    case 'ArrowRight': case 'd': case 'D': setDir(1, 0); break;
  }
});

function tick() {
  direction = nextDirection;
  const head = {x: snake[0].x + direction.x, y: snake[0].y + direction.y};

  // wall collision
  if (head.x < 0 || head.x >= gridSize || head.y < 0 || head.y >= gridSize) {
    endGame();
    return;
  }
  // self collision
  if (snake.some(s => s.x === head.x && s.y === head.y)) {
    endGame();
    return;
  }

  snake.unshift(head);

  if (head.x === food.x && head.y === food.y) {
    score += 10;
    document.getElementById('score').textContent = score;
    food = randomFood();
    playEatSound();
    // speed up slightly
    if (speed > 60) {
      speed -= 3;
      clearInterval(gameLoop);
      gameLoop = setInterval(tick, speed);
    }
  } else {
    snake.pop();
  }

  draw();
}

function draw() {
  ctx.fillStyle = '#0b1120';
  ctx.fillRect(0, 0, canvas.width, canvas.height);

  // grid subtle lines
  ctx.strokeStyle = 'rgba(255,255,255,0.03)';
  for (let i = 0; i <= gridSize; i++) {
    ctx.beginPath();
    ctx.moveTo(i * box, 0);
    ctx.lineTo(i * box, canvas.height);
    ctx.stroke();
    ctx.beginPath();
    ctx.moveTo(0, i * box);
    ctx.lineTo(canvas.width, i * box);
    ctx.stroke();
  }

  // food
  ctx.fillStyle = '#f87171';
  ctx.beginPath();
  ctx.arc(food.x * box + box/2, food.y * box + box/2, box/2 - 3, 0, Math.PI * 2);
  ctx.fill();

  // snake
  snake.forEach((s, i) => {
    ctx.fillStyle = i === 0 ? '#4ade80' : '#22c55e';
    ctx.beginPath();
    ctx.roundRect(s.x * box + 1, s.y * box + 1, box - 2, box - 2, 5);
    ctx.fill();
  });
}

// Draw initial static preview behind the start overlay
resetGame();
draw();
</script>
</body>
</html>
