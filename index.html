<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Game Hub</title>
<link rel="stylesheet" href="style.css" />
</head>
<body>

<div class="app">
  <div class="search-wrap">
    <svg class="search-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
      <circle cx="11" cy="11" r="7"></circle>
      <line x1="21" y1="21" x2="16.65" y2="16.65"></line>
    </svg>
    <input type="text" class="search-input" id="search-input" placeholder="Search games" autocomplete="off" />
    <button class="clear-btn" id="clear-search">&times;</button>
  </div>

  <div class="tabs-row">
    <div class="tab-group">
      <button class="tab-btn active" id="tab-all">All Games</button>
      <button class="tab-btn" id="tab-favorite">Favorite</button>
    </div>
    <button class="trophy-btn" id="trophy-btn" title="Favorites">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8">
        <path d="M8 21h8M12 17v4M7 4h10v4a5 5 0 0 1-10 0V4z"></path>
        <path d="M7 5H4a1 1 0 0 0-1 1c0 2.5 1.5 4.5 4 5M17 5h3a1 1 0 0 1 1 1c0 2.5-1.5 4.5-4 5"></path>
      </svg>
    </button>
  </div>

  <p class="section-label" id="section-label">All Games</p>

  <div class="game-grid" id="game-grid"></div>

  <div class="empty-state" id="empty-state">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6">
      <circle cx="11" cy="11" r="7"></circle>
      <line x1="21" y1="21" x2="16.65" y2="16.65"></line>
    </svg>
    <p class="empty-title" id="empty-title">No games found</p>
    <p class="empty-sub" id="empty-sub">Try a different search term.</p>
  </div>
</div>

<!-- Game player overlay -->
<div class="player-overlay" id="player-overlay">
  <div class="player-bar">
    <button class="player-back" id="player-back">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2">
        <path d="M15 18l-6-6 6-6"></path>
      </svg>
    </button>
    <span class="player-title" id="player-title">Game</span>
  </div>
  <div class="player-frame-wrap" id="player-frame-wrap"></div>
</div>

<script src="script.js"></script>

</body>
</html>
