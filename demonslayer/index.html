<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Sun Breathing Cursor</title>
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }
      html,
      body {
        width: 100%;
        height: 100%;
        overflow: hidden;
        background: #000;
        cursor: none;
        font-family: "Segoe UI", system-ui, sans-serif;
      }
      .bg {
        position: fixed;
        inset: 0;
        z-index: 0;
        background: radial-gradient(
          ellipse at 50% 30%,
          #1a0005 0%,
          #0a0002 40%,
          #000 100%
        );
      }
      .tanjiro-bg {
        position: fixed;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        z-index: 1;
        background-image: url("bg.png");
        background-size: contain;
        background-position: center center;
        background-repeat: no-repeat;
        background-color: #000;
        opacity: 0.85;
        pointer-events: none;
        will-change: transform;
        transition: opacity 0.3s;
      }
      body.aura-active .tanjiro-bg {
        opacity: 0.7;
      }
      #c {
        position: fixed;
        inset: 0;
        z-index: 10;
        pointer-events: none;
      }
      #hd {
        position: fixed;
        inset: 0;
        z-index: 9;
        pointer-events: none;
      }
    </style>
  </head>
  <body>
    <div class="bg"></div>
    <div class="tanjiro-bg" id="tbg"></div>
    <canvas id="hd"></canvas>
    <canvas id="c"></canvas>

    <script>
      (function () {
        "use strict";

        /* ── Canvas & DPR ── */
        const C = document.getElementById("c");
        const ctx = C.getContext("2d");
        const HD = document.getElementById("hd");
        const hctx = HD.getContext("2d");
        let W, H, dpr;

        function resize() {
          dpr = Math.min(devicePixelRatio || 1, 2);
          W = innerWidth;
          H = innerHeight;
          C.width = W * dpr;
          C.height = H * dpr;
          C.style.width = W + "px";
          C.style.height = H + "px";
          ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
          HD.width = W * dpr;
          HD.height = H * dpr;
          HD.style.width = W + "px";
          HD.style.height = H + "px";
          hctx.setTransform(dpr, 0, 0, dpr, 0, 0);
        }
        addEventListener("resize", resize);
        resize();

        /* ── Math helpers ── */
        const lerp = (a, b, t) => a + (b - a) * t;
        const rand = (a, b) => a + Math.random() * (b - a);
        const randi = (a, b) => (a + Math.random() * (b - a)) | 0;
        const clamp = (v, a, b) => Math.max(a, Math.min(b, v));
        const TAU = Math.PI * 2;

        /* ══════════════════════════════════════════════════
           SUN BREATHING COLOR SYSTEM
        ══════════════════════════════════════════════════ */
        const LUT_R = new Uint8Array(256);
        const LUT_G = new Uint8Array(256);
        const LUT_B = new Uint8Array(256);
        (function () {
          const stops = [
            [0, [0, 0, 0]],
            [35, [60, 0, 2]],
            [75, [160, 5, 8]],
            [115, [220, 15, 12]],
            [155, [240, 35, 18]],
            [195, [255, 65, 30]],
            [228, [255, 110, 55]],
            [255, [255, 175, 110]],
          ];
          for (let i = 0; i < 256; i++) {
            for (let s = 0; s < stops.length - 1; s++) {
              const [t0, c0] = stops[s],
                [t1, c1] = stops[s + 1];
              if (i >= t0 && i <= t1) {
                const f = (i - t0) / (t1 - t0);
                LUT_R[i] = (c0[0] + (c1[0] - c0[0]) * f) | 0;
                LUT_G[i] = (c0[1] + (c1[1] - c0[1]) * f) | 0;
                LUT_B[i] = (c0[2] + (c1[2] - c0[2]) * f) | 0;
                break;
              }
            }
          }
        })();

        function sunColor(t, a) {
          const i = clamp(t * 255, 0, 255) | 0;
          return `rgba(${LUT_R[i]},${LUT_G[i]},${LUT_B[i]},${a})`;
        }

        /* ── Pointer state ── */
        const P = {
          x: W / 2,
          y: H / 2,
          tx: W / 2,
          ty: H / 2,
          px: W / 2,
          py: H / 2,
          vx: 0,
          vy: 0,
          speed: 0,
          lastMove: 0,
        };
        function setTarget(x, y) {
          P.tx = x;
          P.ty = y;
          P.lastMove = performance.now();
        }
        addEventListener("mousemove", (e) => setTarget(e.clientX, e.clientY));
        addEventListener(
          "touchmove",
          (e) => {
            if (e.touches.length)
              setTarget(e.touches[0].clientX, e.touches[0].clientY);
          },
          { passive: true }
        );

        addEventListener("mousedown", (e) => {
          document.body.classList.add("aura-active");
          burst(e.clientX, e.clientY);
        });
        addEventListener("mouseup", () =>
          document.body.classList.remove("aura-active")
        );
        addEventListener("mouseleave", () =>
          document.body.classList.remove("aura-active")
        );
        addEventListener(
          "touchstart",
          (e) => {
            document.body.classList.add("aura-active");
            if (e.touches.length) {
              setTarget(e.touches[0].clientX, e.touches[0].clientY);
              burst(P.tx, P.ty);
            }
          },
          { passive: true }
        );
        addEventListener("touchend", () =>
          document.body.classList.remove("aura-active")
        );

        /* ══════════════════════════════════════════
           PARTICLE POOLS
        ══════════════════════════════════════════ */
        const EMAX = 400;
        const embers = [];
        for (let i = 0; i < EMAX; i++) embers.push({ alive: false });
        let eHead = 0;
        function spawnEmber(x, y, vx, vy, life, sz, hot) {
          const e = embers[eHead % EMAX];
          eHead++;
          e.alive = true;
          e.x = x;
          e.y = y;
          e.vx = vx;
          e.vy = vy;
          e.age = 0;
          e.life = life;
          e.sz = sz;
          e.hot = hot;
        }

        const FMAX = 250;
        const flames = [];
        for (let i = 0; i < FMAX; i++) flames.push({ alive: false });
        let fHead = 0;
        function spawnFlame(x, y, vx, vy, r, life, hot) {
          const f = flames[fHead % FMAX];
          fHead++;
          f.alive = true;
          f.x = x;
          f.y = y;
          f.vx = vx;
          f.vy = vy;
          f.age = 0;
          f.life = life;
          f.r = r;
          f.hot = hot;
        }

        const SPKMAX = 300;
        const sparks = [];
        for (let i = 0; i < SPKMAX; i++) sparks.push({ alive: false });
        let spkHead = 0;
        function spawnSpark(x, y, vx, vy, life, bright) {
          const s = sparks[spkHead % SPKMAX];
          spkHead++;
          s.alive = true;
          s.x = x;
          s.y = y;
          s.vx = vx;
          s.vy = vy;
          s.age = 0;
          s.life = life;
          s.bright = bright;
        }

        const waves = [];
        const flashes = [];

        /* ── Ambient background embers (independent of cursor) ── */
        const BGMAX = 60;
        const bgEmbers = [];
        for (let i = 0; i < BGMAX; i++) bgEmbers.push({ alive: false });
        let bgHead = 0;
        function spawnBgEmber() {
          const e = bgEmbers[bgHead % BGMAX];
          bgHead++;
          e.alive = true;
          e.x = rand(0, W);
          e.y = H + rand(0, 60);
          e.vx = rand(-15, 15);
          e.vy = -rand(20, 70);
          e.age = 0;
          e.life = rand(3000, 6500);
          e.sz = rand(1, 3);
          e.hot = rand(0.3, 0.9);
          e.sway = rand(0.5, 1.5);
          e.phase = rand(0, TAU);
        }
        let bgSpawnTimer = 0;

        const TMAX = 40;
        const trail = [];
        function addTrail(x, y, t) {
          if (trail.length >= TMAX) trail.shift();
          trail.push({ x, y, t });
        }

        /* ── Burst (click) ── */
        function burst(x, y) {
          waves.push({ x, y, r: 0, maxR: rand(160, 260), age: 0, life: 550 });
          flashes.push({ x, y, r: 0, maxR: rand(220, 340), age: 0, life: 450 });

          const JETS = 20;
          for (let i = 0; i < JETS; i++) {
            const a = (i / JETS) * TAU + rand(-0.15, 0.15);
            const spd = rand(100, 320);
            spawnFlame(
              x,
              y,
              Math.cos(a) * spd,
              Math.sin(a) * spd,
              rand(20, 48),
              rand(350, 700),
              rand(0.6, 1.0)
            );
          }
          for (let i = 0; i < 90; i++) {
            const a = rand(0, TAU),
              spd = rand(70, 420);
            spawnSpark(
              x,
              y,
              Math.cos(a) * spd,
              Math.sin(a) * spd,
              rand(280, 800),
              rand(0.7, 1.0)
            );
          }
          for (let i = 0; i < 60; i++) {
            const a = rand(0, TAU) - Math.PI / 2,
              spd = rand(30, 180);
            spawnEmber(
              x,
              y,
              Math.cos(a) * spd,
              Math.sin(a) * spd - rand(40, 100),
              rand(450, 1000),
              rand(1.5, 3.2),
              rand(0.5, 1.0)
            );
          }
        }

        /* ── MAIN LOOP ── */
        let last = performance.now();
        let ambE = 0,
          ambF = 0;

        function frame(now) {
          requestAnimationFrame(frame);
          const dt = Math.min(now - last, 33);
          last = now;
          const dtS = dt * 0.001;

          P.px = P.x;
          P.py = P.y;
          const ease = 1 - Math.pow(0.001, dtS * 5);
          P.x = lerp(P.x, P.tx, ease);
          P.y = lerp(P.y, P.ty, ease);
          P.vx = (P.x - P.px) / Math.max(dtS, 0.001);
          P.vy = (P.y - P.py) / Math.max(dtS, 0.001);
          P.speed = Math.hypot(P.vx, P.vy);

          const bx = (P.tx / W - 0.5) * -8;
          const by = (P.ty / H - 0.5) * -8;
          document.getElementById("tbg").style.transform =
            `translate(${bx}px,${by}px) scale(1.02)`;

          addTrail(P.x, P.y, now);
          while (trail.length && now - trail[0].t > 300) trail.shift();

          const idle = now - P.lastMove;
          const moving = idle < 120;
          const speedFactor = clamp(P.speed / 300, 0, 1);

          bgSpawnTimer -= dt;
          if (bgSpawnTimer <= 0) {
            bgSpawnTimer = rand(60, 140);
            spawnBgEmber();
          }

          ambE -= dt;
          if (ambE <= 0) {
            ambE = moving ? rand(8, 20) : rand(25, 50);
            const n = moving ? randi(2, 5) : 1;
            for (let i = 0; i < n; i++) {
              const a = -Math.PI / 2 + rand(-0.8, 0.8);
              const spd = rand(20, 80) * (1 + speedFactor * 2);
              spawnEmber(
                P.x + rand(-5, 5),
                P.y + rand(-5, 5),
                Math.cos(a) * spd,
                Math.sin(a) * spd - rand(20, 50),
                rand(500, 1100),
                rand(1.2, 2.8),
                rand(0.3, 0.8)
              );
            }
          }

          ambF -= dt;
          if (ambF <= 0) {
            ambF = moving ? rand(12, 28) : rand(35, 70);
            const n = moving ? randi(2, 5) : randi(1, 2);
            for (let i = 0; i < n; i++) {
              const a = -Math.PI / 2 + rand(-1.0, 1.0);
              const spd = rand(15, 70) * (1 + speedFactor * 1.5);
              spawnFlame(
                P.x + rand(-6, 6),
                P.y + rand(-6, 6),
                Math.cos(a) * spd * 0.5,
                Math.sin(a) * spd - rand(10, 40),
                rand(8, 22) * (1 + speedFactor * 0.8),
                rand(150, 320),
                rand(0.4, 1.0)
              );
            }
          }

          if (moving && P.speed > 20) {
            const n = clamp((P.speed / 100) | 0, 1, 5);
            for (let i = 0; i < n; i++) {
              const t = Math.random();
              const sx = lerp(P.px, P.x, t),
                sy = lerp(P.py, P.y, t);
              const a = -Math.PI / 2 + rand(-1.1, 1.1);
              const spd = rand(30, 110) + speedFactor * 60;
              spawnFlame(
                sx + rand(-4, 4),
                sy + rand(-4, 4),
                P.vx * 0.1 + Math.cos(a) * spd * 0.4,
                -Math.abs(Math.sin(a) * spd) - rand(20, 55),
                rand(7, 18),
                rand(140, 300),
                rand(0.6, 1.0)
              );
              if (Math.random() < 0.5)
                spawnEmber(
                  sx,
                  sy,
                  P.vx * 0.08 + rand(-40, 40),
                  -rand(40, 130),
                  rand(450, 950),
                  rand(1, 2.2),
                  rand(0.5, 1.0)
                );
            }
          }

          /* ═══════════ DRAW ═══════════ */
          ctx.clearRect(0, 0, W, H);
          ctx.globalCompositeOperation = "lighter";

          for (let i = 0; i < BGMAX; i++) {
            const e = bgEmbers[i];
            if (!e.alive) continue;
            e.age += dt;
            if (e.age >= e.life) {
              e.alive = false;
              continue;
            }
            e.x += (e.vx + Math.sin(now * 0.001 * e.sway + e.phase) * 12) * dtS;
            e.y += e.vy * dtS;
            const tp = e.age / e.life;
            const a = Math.sin(tp * Math.PI) * 0.55 * e.hot;
            ctx.fillStyle = sunColor(e.hot, a);
            ctx.beginPath();
            ctx.arc(e.x, e.y, e.sz, 0, TAU);
            ctx.fill();
          }

          for (let i = flashes.length - 1; i >= 0; i--) {
            const f = flashes[i];
            f.age += dt;
            if (f.age >= f.life) {
              flashes.splice(i, 1);
              continue;
            }
            const tp = f.age / f.life;
            const r = lerp(0, f.maxR, Math.pow(tp, 0.3));
            const a = (1 - tp) * (1 - tp) * 0.35;
            const g = ctx.createRadialGradient(f.x, f.y, 0, f.x, f.y, r);
            g.addColorStop(0, `rgba(255,120,60,${a})`);
            g.addColorStop(0.22, `rgba(240,40,15,${a * 0.82})`);
            g.addColorStop(0.55, `rgba(180,8,5,${a * 0.48})`);
            g.addColorStop(0.8, `rgba(80,0,2,${a * 0.22})`);
            g.addColorStop(1, "rgba(0,0,0,0)");
            ctx.fillStyle = g;
            ctx.beginPath();
            ctx.arc(f.x, f.y, r, 0, TAU);
            ctx.fill();
          }

          for (let i = waves.length - 1; i >= 0; i--) {
            const w = waves[i];
            w.age += dt;
            if (w.age >= w.life) {
              waves.splice(i, 1);
              continue;
            }
            const tp = w.age / w.life;
            const r = lerp(0, w.maxR, Math.pow(tp, 0.5));
            const a = (1 - tp) * (1 - tp) * 0.7;
            const lw = lerp(8, 0.5, tp);

            ctx.beginPath();
            ctx.arc(w.x, w.y, r, 0, TAU);
            ctx.lineWidth = lw;
            ctx.strokeStyle = `rgba(240,50,18,${a})`;
            ctx.stroke();

            ctx.lineWidth = lw * 3;
            ctx.strokeStyle = `rgba(160,8,5,${a * 0.35})`;
            ctx.stroke();
          }

          for (let i = 0; i < FMAX; i++) {
            const f = flames[i];
            if (!f.alive) continue;
            f.age += dt;
            if (f.age >= f.life) {
              f.alive = false;
              continue;
            }
            f.x += f.vx * dtS;
            f.y += f.vy * dtS;
            f.vy -= dtS * 55;
            f.vx *= Math.pow(0.95, dtS * 60);
            const tp = f.age / f.life;
            const hotness = f.hot * (1 - tp);
            const r = f.r * (1 + tp * 0.3);
            const a = Math.sin(tp * Math.PI) * 0.7 * f.hot;
            const g = ctx.createRadialGradient(f.x, f.y, 0, f.x, f.y, Math.max(1, r));
            g.addColorStop(0, sunColor(hotness, a));
            g.addColorStop(0.45, sunColor(hotness * 0.6, a * 0.7));
            g.addColorStop(0.8, sunColor(hotness * 0.3, a * 0.3));
            g.addColorStop(1, "rgba(0,0,0,0)");
            ctx.fillStyle = g;
            ctx.beginPath();
            ctx.arc(f.x, f.y, Math.max(1, r), 0, TAU);
            ctx.fill();
          }

          for (let i = 0; i < EMAX; i++) {
            const e = embers[i];
            if (!e.alive) continue;
            e.age += dt;
            if (e.age >= e.life) {
              e.alive = false;
              continue;
            }
            e.x += e.vx * dtS;
            e.y += e.vy * dtS;
            e.vy += 60 * dtS;
            const tp = e.age / e.life;
            const a = (1 - tp) * 0.9 * e.hot;
            ctx.fillStyle = sunColor(e.hot * (1 - tp * 0.5), a);
            ctx.beginPath();
            ctx.arc(e.x, e.y, e.sz, 0, TAU);
            ctx.fill();
          }

          for (let i = 0; i < SPKMAX; i++) {
            const s = sparks[i];
            if (!s.alive) continue;
            s.age += dt;
            if (s.age >= s.life) {
              s.alive = false;
              continue;
            }
            const px = s.x,
              py = s.y;
            s.x += s.vx * dtS;
            s.y += s.vy * dtS;
            s.vx *= Math.pow(0.9, dtS * 60);
            s.vy *= Math.pow(0.9, dtS * 60);
            const tp = s.age / s.life;
            const a = (1 - tp) * s.bright;
            ctx.strokeStyle = `rgba(255,140,60,${a})`;
            ctx.lineWidth = 1.5;
            ctx.beginPath();
            ctx.moveTo(px, py);
            ctx.lineTo(s.x, s.y);
            ctx.stroke();
          }

          if (trail.length >= 2) {
            for (let i = 1; i < trail.length; i++) {
              const age = (now - trail[i].t) / 300;
              const alpha = clamp(1 - age, 0, 1);
              if (alpha < 0.01) continue;
              const w = lerp(2, 9, 1 - age);
              ctx.beginPath();
              ctx.moveTo(trail[i - 1].x, trail[i - 1].y);
              ctx.lineTo(trail[i].x, trail[i].y);
              ctx.lineWidth = w * 3.5;
              ctx.strokeStyle = `rgba(140,5,2,${alpha * 0.15})`;
              ctx.stroke();
              ctx.lineWidth = w * 2;
              ctx.strokeStyle = `rgba(230,25,10,${alpha * 0.4})`;
              ctx.stroke();
              ctx.lineWidth = w;
              ctx.strokeStyle = `rgba(255,90,40,${alpha * 0.7})`;
              ctx.stroke();
            }
          }

          /* Cursor core */
          const coreR = 6 + speedFactor * 3;
          const coreG = ctx.createRadialGradient(P.x, P.y, 0, P.x, P.y, coreR * 4);
          coreG.addColorStop(0, "rgba(255,200,150,0.9)");
          coreG.addColorStop(0.3, "rgba(255,80,30,0.6)");
          coreG.addColorStop(1, "rgba(0,0,0,0)");
          ctx.fillStyle = coreG;
          ctx.beginPath();
          ctx.arc(P.x, P.y, coreR * 4, 0, TAU);
          ctx.fill();

          ctx.globalCompositeOperation = "source-over";
        }
        requestAnimationFrame(frame);
      })();
    </script>
  </body>
</html>
